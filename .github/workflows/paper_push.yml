name: Daily Paper Push

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 

# 【核心修改】：增加 workflows: write 权限
permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # 拉取所有历史，确保分支同步

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen.json cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-json-${{ hashFiles('seen.json') }}
          restore-keys: seen-json-

      - name: Run paper push
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python paper_push.py

      - name: Save seen.json back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update seen.json [skip ci]"
          file_pattern: 'seen.json'
          # 【建议】：去掉 push_options: '--force'，让它默认尝试合并推送
