name: Daily Paper Push

on:
  schedule:
    # 北京时间 08:00 = UTC 00:00
    - cron: "0 0 * * *"
  workflow_dispatch:  # 允许手动触发，方便测试

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen.json cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-json-${{ hashFiles('seen.json') }}
          restore-keys: seen-json-

      - name: Run paper push
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python paper_push.py

      - name: Save seen.json back to repo
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add seen.json
          git diff --cached --quiet || git commit -m "chore: update seen.json [skip ci]"
          git push
