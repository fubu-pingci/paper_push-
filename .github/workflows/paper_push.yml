name: Daily Paper Push

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch: 

# 【关键修改 1】：增加全局写入权限
permissions:
  contents: write

jobs:
  push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          # 加上这个防止处于“头指针分离”状态导致 push 失败
          ref: main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen.json cache
        uses: actions/cache@v4
        with:
          path: seen.json
          key: seen-json-${{ hashFiles('seen.json') }}
          restore-keys: seen-json-

      - name: Run paper push
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python paper_push.py

      # 【关键修改 2】：使用专用 Action 替代手动 git 命令，更安全且自动处理权限冲突
      - name: Save seen.json back to repo
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update seen.json [skip ci]"
          file_pattern: 'seen.json'
